[25163,[\"/research_self_study/_next/static/chunks/015if3nq3p288.js\",\"/research_self_study/_next/static/chunks/14mrh2-p_w84d.js\",\"/research_self_study/_next/static/chunks/1ipf9t-bsy23i.js\",\"/research_self_study/_next/static/chunks/1g94rqa64b03x.js\"],\"QuizRunner\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"children\":[[\"$\",\"$L11\",null,{\"href\":\"/survey-research\",\"className\":\"focus-ring mb-6 inline-flex items-center gap-2 rounded-md px-2 py-2 text-sm font-semibold text-brand-ink hover:bg-brand-tint/60\",\"children\":[[\"$\",\"svg\",null,{\"ref\":\"$undefined\",\"xmlns\":\"http://www.w3.org/2000/svg\",\"width\":24,\"height\":24,\"viewBox\":\"0 0 24 24\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"strokeWidth\":2,\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"className\":\"lucide lucide-arrow-left h-4 w-4\",\"aria-hidden\":\"true\",\"children\":[[\"$\",\"path\",\"1l729n\",{\"d\":\"m12 19-7-7 7-7\"}],[\"$\",\"path\",\"x3x0zl\",{\"d\":\"M19 12H5\"}],\"$undefined\"]}],\"回到\",\"問卷研究與量表分析\",\"內容\"]}],[\"$\",\"section\",null,{\"className\":\"mb-8 max-w-3xl\",\"children\":[[\"$\",\"div\",null,{\"className\":\"mb-3 flex flex-wrap items-center gap-3\",\"children\":[[\"$\",\"p\",null,{\"className\":\"eyebrow\",\"children\":\"Post-test\"}],[\"$\",\"span\",null,{\"className\":\"inline-flex items-center rounded-md px-2.5 py-1 text-xs font-medium ring-1 bg-brand-tint text-brand-ink ring-brand/25\",\"children\":\"第 3 層後測\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold tracking-tight text-ink sm:text-4xl\",\"children\":\"問卷研究與量表分析・學習後測\"}],[\"$\",\"p\",null,{\"className\":\"mt-4 max-w-measure text-base leading-8 text-ink-soft sm:text-lg\",\"children\":\"問卷流程、資料清理、信度與 EFA 的判讀重點。\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-8 rounded-card rounded-tl-none border border-brand/25 bg-brand-tint/60 p-4 text-sm leading-7 text-ink-soft\",\"children\":[\"從題庫 \",15,\" 題中隨機抽出 \",10,\" 題，逐題作答、立即看解析。 答對 \",80,\"% 以上即為通過；沒過也沒關係，看完錯題解析再測一次，成績會記在你的裝置上。\"]}],[\"$\",\"$L12\",null,{\"meta\":{\"layer\":3,\"slug\":\"layer3\",\"levelLabel\":\"第 3 層\",\"title\":\"問卷研究與量表分析\",\"subtitle\":\"問卷流程、資料清理、信度與 EFA 的判讀重點。\",\"contentHref\":\"/survey-research\",\"questions\":[{\"id\":\"L3-01\",\"layer\":3,\"topic\":\"問卷研究流程\",\"type\":\"single\",\"stem\":\"阿哲收到指導教授寄回的問卷資料檔後，很興奮地想馬上跑迴歸驗證他的研究假設。依照問卷研究流程（Step 1-10），在「假設檢定」之前，他還漏掉了哪一個關鍵步驟？\",\"options\":[\"先做資料清理，並檢查信度與效度，確認構面分數可用\",\"先寫好結果章的文字，再回頭跑統計\",\"先增加樣本數，樣本越多假設一定越顯著\",\"什麼都不用做，資料下載後就能直接跑迴歸\"],\"answer\":0,\"explanation\":\"問卷研究流程是先資料清理（Step 7）、再信度效度分析（Step 8），確認構面分數可用之後才進入假設檢定（Step 9）。跳過清理與信效度就直接跑迴歸，等於在分析一份還沒確認品質的資料，顯著結果也不值得信任。結果撰寫是最後一步、增加樣本並不能取代清理，直接跑分析更是常見錯誤。\",\"reviewHref\":\"/survey-research#workflow-title\",\"difficulty\":1},{\"id\":\"L3-02\",\"layer\":3,\"topic\":\"反向題處理\",\"type\":\"single\",\"stem\":\"某學習動機量表是五點量表，其中有一題「我常常懶得完成課程作業」是反向題。學生填 2 分。在計算構面平均與信度前，這題應該先轉換成幾分？\",\"options\":[\"維持 2 分，反向題不用特別處理\",\"轉成 4 分（新分數 = 6 − 原分數）\",\"轉成 3 分，取中間值就好\",\"直接把這題刪掉，反向題都不能用\"],\"answer\":1,\"explanation\":\"五點量表反向題的轉換公式是「新分數 = 6 − 原分數」，所以 2 分要轉成 4 分，方向才會和同構面其他題項一致。若不轉換就直接算構面平均或跑 Cronbach's α，會拉低信度甚至讓結果方向相反。反向題不是要刪掉，而是要先轉分後保留。\",\"reviewHref\":\"/survey-cleaning#reverse-items\",\"difficulty\":1},{\"id\":\"L3-03\",\"layer\":3,\"topic\":\"信度輸出判讀\",\"type\":\"single\",\"stem\":\"小美整理出各構面的信度表如下：\\n\\n構面 | 題項數 | Cronbach's α\\n學習動機 | 5 | .87\\n平台易用性 | 4 | .82\\n學習滿意度 | 5 | .89\\n\\n她要寫進論文的是哪個結論最合適？\",\"options\":[\"三個構面 α 都偏低，量表不能用\",\"三個構面 α 都達良好水準，顯示題項具有良好內部一致性\",\"α 只要有數字就代表因果關係成立\",\"α 越接近 1 越好，應該想辦法讓每個都逼近 1.00\"],\"answer\":1,\"explanation\":\"三個構面的 α 都在 .82 到 .89 之間，屬於良好的內部一致性，可以寫成「各構面 α 顯示題項具有良好內部一致性」。α 並不是越高越好，太高（例如 .95 以上）反而可能代表題目過度重複；α 也只反映一致性，跟因果無關。\",\"reviewHref\":\"/methods/reliability-analysis#output-reading\",\"difficulty\":2},{\"id\":\"L3-04\",\"layer\":3,\"topic\":\"刪題判斷\",\"type\":\"single\",\"stem\":\"某構面信度分析輸出如下（修正後項目總相關 = 題項與總分的相關）：\\n\\n題項 | 修正後項目總相關 | 刪題後 α\\n LS1 | .62 | .84\\n LS2 | .58 | .85\\n LS3 | .11 | .90\\n LS4 | .60 | .84\\n\\n目前整體 α = .86。最需要優先檢查、考慮是否刪除的是哪一題？\",\"options\":[\"LS1，因為它的項目總相關最高\",\"LS3，因為它的項目總相關明顯偏低，且刪掉後 α 反而上升\",\"LS4，因為它排在最後面\",\"四題都很好，完全不用檢查\"],\"answer\":1,\"explanation\":\"LS3 的修正後項目總相關只有 .11，明顯低於其他題（.58 以上），而且刪掉它之後 α 從 .86 上升到 .90，代表這題可能沒在測同一件事，最該優先檢查。但要注意：刪題不能只看數字，要回到題目內容與理論判斷是否真的該刪，不能因為 α 會變高就任意刪題。\",\"reviewHref\":\"/methods/reliability-analysis#output-reading\",\"difficulty\":3},{\"id\":\"L3-05\",\"layer\":3,\"topic\":\"構面平均分數\",\"type\":\"single\",\"stem\":\"阿明的問卷共 30 題，測量「學習動機」「平台易用性」「學習滿意度」三個構面。他想建立構面分數，下列做法哪個正確？\",\"options\":[\"把全部 30 題平均成一個總分，當作整份問卷分數來分析\",\"各構面題項先確認反向題已轉換，再分別建立各自的構面平均（如 LS_mean）\",\"隨便挑每個構面的第一題代表整個構面\",\"把不同構面的題項混在一起平均，比較省事\"],\"answer\":1,\"explanation\":\"同一構面的題項（且反向題已轉換）才可以合併成構面平均分數，例如學習滿意度 LS1–LS5 建立 LS_mean。把不同構面題項混在一起平均、或把全部 30 題平均成單一總分，都會讓不同概念被攪在一起；用單一題項代表整個構面則無法做信度分析。\",\"reviewHref\":\"/survey-cleaning#scale-score\",\"difficulty\":2},{\"id\":\"L3-06\",\"layer\":3,\"topic\":\"無效問卷\",\"type\":\"scenario\",\"stem\":\"某線上課程滿意度問卷共 40 題。回收後發現：有一份問卷整份 40 題全部都選「3」，作答時間只有 25 秒。針對這份問卷，最合適的做法是什麼？\",\"options\":[\"直接保留，樣本數越多越好\",\"依事先訂好的排除標準（如整份同一答案、作答時間過短）判斷是否為無效問卷並剔除，且在方法章說明規則\",\"看到答案不順眼就主觀刪掉，不用寫理由\",\"把這份問卷的 3 分全部改成隨機數字再留下來\"],\"answer\":1,\"explanation\":\"整份都選同一答案、作答時間過短，都是無效問卷的典型特徵。正確做法是先訂明確的排除標準，再依標準剔除，並在論文方法章說明。不能因為要衝樣本數就照單全收，也不能憑主觀好惡刪除，更不能竄改受試者的答案。\",\"reviewHref\":\"/survey-cleaning#invalid-responses\",\"difficulty\":2},{\"id\":\"L3-07\",\"layer\":3,\"topic\":\"資料清理順序\",\"type\":\"scenario\",\"stem\":\"曉琪下載完正式問卷資料，準備開始清理。依照資料清理的流程，她「第一步」最該做什麼？\",\"options\":[\"馬上把資料丟進 SPSS 跑因素分析\",\"先確認每列是否代表一位受試者、每欄是否代表一個題項，並保留一份原始檔不要覆蓋\",\"先跑假設檢定，看結果顯不顯著再決定要不要清理\",\"先刪掉所有她覺得怪怪的問卷\"],\"answer\":1,\"explanation\":\"資料清理第一步是確認資料表結構（每列是一位受試者、每欄是一個題項或背景變項），並保留一份原始檔，避免一開始就拿錯誤格式去分析。一下載就直接跑因素分析或假設檢定，會跳過命名、反向題、遺漏值、無效問卷等處理；未訂規則就先刪問卷也不恰當。\",\"reviewHref\":\"/survey-cleaning#first-look\",\"difficulty\":1},{\"id\":\"L3-08\",\"layer\":3,\"topic\":\"EFA 前置檢定\",\"type\":\"single\",\"stem\":\"研究生想對 20 題服務品質題項做 EFA（探索性因素分析），看它們能不能分成幾個構面。在解讀因素負荷量之前，他應該先看哪兩個指標，確認資料適不適合做因素分析？\",\"options\":[\"R² 與 F 值\",\"KMO 與 Bartlett 球形檢定\",\"β 與 t 值\",\"Pearson r 與信賴區間\"],\"answer\":1,\"explanation\":\"EFA 的輸出判讀順序是「先看 KMO 與 Bartlett，再看因素負荷量」。KMO 越高代表資料越適合因素分析，Bartlett 球形檢定達顯著（p \u003c .05）代表題項之間有足夠相關。R²/F、β/t 是迴歸的指標，Pearson r 是相關分析的指標，都不是 EFA 的前置檢定。\",\"reviewHref\":\"/methods/efa#output-reading\",\"difficulty\":2},{\"id\":\"L3-09\",\"layer\":3,\"topic\":\"EFA 輸出判讀\",\"type\":\"single\",\"stem\":\"某 EFA 的 KMO and Bartlett's Test 輸出如下：\\n\\nKMO | .88\\nBartlett χ² | 1245.36\\ndf | 190\\np | \u003c .001\\n\\n關於這份結果，下列判讀何者正確？\",\"options\":[\"KMO 太低、Bartlett 不顯著，不適合做因素分析\",\"KMO = .88 屬理想，Bartlett 檢定達顯著，表示資料適合進行因素分析\",\"Bartlett p \u003c .001 代表因果關係成立\",\"這張表要看 β 值才能判斷\"],\"answer\":1,\"explanation\":\"KMO = .88 屬於理想範圍，Bartlett 球形檢定 p \u003c .001 達顯著，代表題項之間有足夠相關，資料適合進行因素分析（可寫成「KMO = .88，Bartlett χ² = 1245.36, p \u003c .001，表示資料適合進行因素分析」）。Bartlett 只是檢定相關矩陣，跟因果無關；這張表也沒有 β 值。\",\"reviewHref\":\"/output-guide\",\"difficulty\":2},{\"id\":\"L3-10\",\"layer\":3,\"topic\":\"因素負荷量與命名\",\"type\":\"single\",\"stem\":\"轉軸後的因素負荷量矩陣跑出來後，研究生看到某些題項在因素 1 和因素 2 上的負荷量都很高（跨負荷），有些題項則明顯只落在一個因素。他該怎麼處理與命名因素？\",\"options\":[\"只看數字最大的欄位就自動幫因素命名，不用管題目內容\",\"跨負荷題項要回到理論與題目內容判斷如何處理，並依保留題項的內容為因素命名\",\"特徵值大於 1 就一定要保留該因素，完全不看理論\",\"因素負荷量越低的題項越應該保留\"],\"answer\":1,\"explanation\":\"因素負荷量越高代表題項越能代表該因素，但跨負荷（在多個因素都高）的題項需要回到理論與題目內容判斷如何處理；命名因素也不能只看數字自動命名，要根據保留題項的內容與理論。只看特徵值大於 1、忽略理論，或保留低負荷題項，都是常見錯誤。\",\"reviewHref\":\"/methods/efa#common-mistakes\",\"difficulty\":3},{\"id\":\"L3-11\",\"layer\":3,\"topic\":\"信度分析誤解\",\"type\":\"multi\",\"stem\":\"關於 Cronbach's α（信度），下列哪些說法「有問題」、需要被糾正？（複選）\",\"options\":[\"α 非常高（例如接近 1）就一定越好，數字越大越理想\",\"反向題還沒轉換就直接跑 Cronbach's α\",\"刪題後 α 會上升就一定要把那題刪掉，不用看題意\",\"同一構面若只有單一題項，其實不適合用信度分析\"],\"answer\":[0,1,2],\"explanation\":\"選項 A、B、C 都是要被糾正的錯誤：α 太高可能代表題目重複，不是越高越好；反向題沒轉換就跑信度會失真；刪題不能只看 α 提升而不看題意與理論。選項 D 反而是正確觀念——信度分析要用在同一構面的多個題項，單一題項不適合，所以它不屬於「有問題」的說法。\",\"reviewHref\":\"/methods/reliability-analysis#common-mistakes\",\"difficulty\":3},{\"id\":\"L3-12\",\"layer\":3,\"topic\":\"資料清理清單\",\"type\":\"multi\",\"stem\":\"在跑正式統計分析「之前」，資料清理的分析前檢查清單應該包含哪些項目？（複選）\",\"options\":[\"原始檔已備份、欄位命名清楚\",\"反向題已轉換、遺漏值與無效問卷已處理\",\"各構面平均分數已建立\",\"已經先把假設檢定的 p 值算出來並寫進結果章\"],\"answer\":[0,1,2],\"explanation\":\"分析前檢查清單包含：原始檔已備份、欄位命名清楚、反向題已轉換、遺漏值與無效問卷已處理、構面平均已建立（選項 A、B、C）。選項 D 是分析階段的事，屬於清理完成之後的假設檢定與結果撰寫，不該放在「分析前」的清理清單裡——資料沒清乾淨，後面的顯著結果也不值得信任。\",\"reviewHref\":\"/survey-cleaning#pre-analysis-checklist\",\"difficulty\":2},{\"id\":\"L3-13\",\"layer\":3,\"topic\":\"選擇統計方法\",\"type\":\"scenario\",\"stem\":\"研究生設計了一份新的「線上學習投入量表」，但不確定當初設計的題項是否真的能分成他預期的三個構面。他想探索這些題目背後實際上分成幾個因素。最適合用哪個分析？\",\"options\":[\"信度分析 Cronbach's α\",\"探索性因素分析 EFA\",\"簡單相關分析\",\"多元迴歸分析\"],\"answer\":1,\"explanation\":\"當你「不確定題項是否真的分成原本設計的幾個構面」、想探索題目背後的因素結構時，最適合用 EFA，特別適合新量表發展或改編。信度分析是檢查同構面題項是否一致（前提是已知構面歸屬），相關與迴歸則是檢驗構面之間的關係或預測，都不是用來探索因素結構的。\",\"reviewHref\":\"/survey-research#methods-title\",\"difficulty\":2},{\"id\":\"L3-14\",\"layer\":3,\"topic\":\"題項編碼與變項命名\",\"type\":\"single\",\"stem\":\"曉華在整理問卷欄位時，把每個欄位名稱都直接貼上完整的題目全文（例如「我覺得這個平台操作起來很簡單」），並把「性別」編成 1、2 後，打算在迴歸裡把它當連續分數解釋。這裡有什麼問題？\",\"options\":[\"完全沒問題，這是最推薦的做法\",\"欄位名稱應改用短而可辨識的代碼（同構面同前綴），且性別是類別變項，不能直接當連續分數解釋\",\"題目全文當欄位名稱很好，但性別當連續分數也沒關係\",\"只要性別改成文字就好，欄位名稱不用改\"],\"answer\":1,\"explanation\":\"變項命名應使用短而可辨識的代碼、同一構面用相同前綴，並建立代碼表；保留過長題目全文當欄位名稱，分析時容易選錯欄位。此外性別、科系這類類別變項不能直接當連續分數解釋（1、2 只是標籤，不是大小），必要時要用 dummy coding。兩個問題都存在，所以要同時修正。\",\"reviewHref\":\"/survey-cleaning#variable-naming\",\"difficulty\":2},{\"id\":\"L3-15\",\"layer\":3,\"topic\":\"遺漏值處理\",\"type\":\"multi\",\"stem\":\"回收問卷後檢查遺漏值時，下列哪些是正確的處理原則？（複選）\",\"options\":[\"檢查每題的遺漏比例，並分辨是零星遺漏還是整份問卷未完成\",\"記錄刪除或補值規則，並在論文方法章說明處理方式\",\"看到有空白就默默把整批資料刪掉，不用寫理由\",\"大量未完成（例如只填前 10 題、後面全空）的問卷通常應排除\"],\"answer\":[0,1,3],\"explanation\":\"正確的遺漏值處理包括：檢查每題遺漏比例、分辨零星遺漏或整份未完成（A）、記錄規則並在方法章說明（B）、大量未完成的問卷通常應排除（D）。選項 C「默默刪資料、不寫理由」是常見錯誤——零星遺漏可依規則處理，但任何刪除都要有明確規則並說明，不能默默進行。\",\"reviewHref\":\"/survey-cleaning#missing-values\",\"difficulty\":2}]}}]]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"第 3 層後測：問卷研究與量表分析｜研究論文統計自學網站\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"問卷研究與量表分析的學習後測，15 題中隨機抽 10 題，逐題作答並立即回饋。\"}]]\n"])</script></body></html>
