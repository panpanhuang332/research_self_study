63,[\"/research_self_study/_next/static/chunks/015if3nq3p288.js\",\"/research_self_study/_next/static/chunks/14mrh2-p_w84d.js\",\"/research_self_study/_next/static/chunks/1ipf9t-bsy23i.js\",\"/research_self_study/_next/static/chunks/1g94rqa64b03x.js\"],\"QuizRunner\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"children\":[[\"$\",\"$L11\",null,{\"href\":\"/research-variables\",\"className\":\"focus-ring mb-6 inline-flex items-center gap-2 rounded-md px-2 py-2 text-sm font-semibold text-brand-ink hover:bg-brand-tint/60\",\"children\":[[\"$\",\"svg\",null,{\"ref\":\"$undefined\",\"xmlns\":\"http://www.w3.org/2000/svg\",\"width\":24,\"height\":24,\"viewBox\":\"0 0 24 24\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"strokeWidth\":2,\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"className\":\"lucide lucide-arrow-left h-4 w-4\",\"aria-hidden\":\"true\",\"children\":[[\"$\",\"path\",\"1l729n\",{\"d\":\"m12 19-7-7 7-7\"}],[\"$\",\"path\",\"x3x0zl\",{\"d\":\"M19 12H5\"}],\"$undefined\"]}],\"回到\",\"研究問題與變項\",\"內容\"]}],[\"$\",\"section\",null,{\"className\":\"mb-8 max-w-3xl\",\"children\":[[\"$\",\"div\",null,{\"className\":\"mb-3 flex flex-wrap items-center gap-3\",\"children\":[[\"$\",\"p\",null,{\"className\":\"eyebrow\",\"children\":\"Post-test\"}],[\"$\",\"span\",null,{\"className\":\"inline-flex items-center rounded-md px-2.5 py-1 text-xs font-medium ring-1 bg-brand-tint text-brand-ink ring-brand/25\",\"children\":\"第 1 層後測\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold tracking-tight text-ink sm:text-4xl\",\"children\":\"研究問題與變項・學習後測\"}],[\"$\",\"p\",null,{\"className\":\"mt-4 max-w-measure text-base leading-8 text-ink-soft sm:text-lg\",\"children\":\"把生活問題拆成可分析的研究問題，並分辨中介與調節。\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-8 rounded-card rounded-tl-none border border-brand/25 bg-brand-tint/60 p-4 text-sm leading-7 text-ink-soft\",\"children\":[\"從題庫 \",15,\" 題中隨機抽出 \",10,\" 題，逐題作答、立即看解析。 答對 \",80,\"% 以上即為通過；沒過也沒關係，看完錯題解析再測一次，成績會記在你的裝置上。\"]}],[\"$\",\"$L12\",null,{\"meta\":{\"layer\":1,\"slug\":\"layer1\",\"levelLabel\":\"第 1 層\",\"title\":\"研究問題與變項\",\"subtitle\":\"把生活問題拆成可分析的研究問題，並分辨中介與調節。\",\"contentHref\":\"/research-variables\",\"questions\":[{\"id\":\"L1-01\",\"layer\":1,\"topic\":\"日常問題轉研究問題\",\"type\":\"single\",\"stem\":\"下列哪一個，是把日常疑問「大家為什麼都不滿意？」改寫成比較適合研究的問題？\",\"options\":[\"為什麼大家都不滿意？\",\"排隊時間是否會影響顧客滿意度？\",\"便利商店好不好？\",\"服務品質很重要吧？\"],\"answer\":1,\"explanation\":\"日常問題可以很口語，但研究問題要能被資料回答。把籠統的「為什麼不滿意」收斂成「排隊時間是否會影響顧客滿意度」，講清楚了可能原因與想解釋的結果，才進得了分析。\",\"reviewHref\":\"/research-variables#daily-vs-research\",\"difficulty\":1},{\"id\":\"L1-02\",\"layer\":1,\"topic\":\"可研究的問題條件\",\"type\":\"multi\",\"stem\":\"一個「可以被研究」的問題，通常需要具備哪些條件？（可複選）\",\"options\":[\"有清楚的研究對象\",\"有可觀察、可測量的變項\",\"有辦法收集到資料\",\"問題範圍越大、越抽象越好\"],\"answer\":[0,1,2],\"explanation\":\"能被研究的問題通常要有清楚對象、可觀察的變項，以及可以收集資料的方式。太抽象、太大或無法測量的問題，需要先縮小，不是越大越好。\",\"reviewHref\":\"/research-variables#researchable-question\",\"difficulty\":1},{\"id\":\"L1-03\",\"layer\":1,\"topic\":\"拆變項\",\"type\":\"scenario\",\"stem\":\"研究問題：「排隊時間是否會影響顧客滿意度？」\\n這裡的自變項與依變項分別是什麼？\",\"options\":[\"自變項＝顧客滿意度；依變項＝排隊時間\",\"自變項＝排隊時間；依變項＝顧客滿意度\",\"兩個都是自變項\",\"兩個都是控制變項\"],\"answer\":1,\"explanation\":\"先找「可能原因」與「想解釋的結果」。排隊時間是你懷疑的原因（自變項），顧客滿意度是想解釋的結果（依變項）。\",\"reviewHref\":\"/research-variables#full-examples\",\"difficulty\":1},{\"id\":\"L1-04\",\"layer\":1,\"topic\":\"控制變項\",\"type\":\"scenario\",\"stem\":\"研究問題：「工作壓力是否會影響工作滿意度？」\\n下列哪一個最適合當成控制變項？\",\"options\":[\"工作壓力\",\"工作滿意度\",\"年資\",\"以上皆非\"],\"answer\":2,\"explanation\":\"工作壓力是自變項、工作滿意度是依變項，都是研究主角。年資也可能影響工作滿意度，但不是這個研究要探討的重點，適合放進控制變項，避免它干擾主要關係的判斷。\",\"reviewHref\":\"/research-variables#find-control\",\"difficulty\":2},{\"id\":\"L1-05\",\"layer\":1,\"topic\":\"中介變項\",\"type\":\"scenario\",\"stem\":\"研究問題：「平台易用性是否透過學習滿意度，進而影響持續使用意願？」\\n「學習滿意度」在這裡是什麼角色？\",\"options\":[\"自變項\",\"依變項\",\"中介變項\",\"調節變項\"],\"answer\":2,\"explanation\":\"自變項是平台易用性、依變項是持續使用意願。學習滿意度夾在中間，用來解釋「易用性為什麼會影響持續使用」，是中介變項（中間的機制／路徑）。\",\"reviewHref\":\"/research-language#mediator\",\"difficulty\":2},{\"id\":\"L1-06\",\"layer\":1,\"topic\":\"調節變項\",\"type\":\"scenario\",\"stem\":\"研究問題：「主管支持是否會降低『工作壓力對離職意圖』的影響？」\\n「主管支持」在這裡是什麼角色？\",\"options\":[\"自變項\",\"中介變項\",\"調節變項\",\"依變項\"],\"answer\":2,\"explanation\":\"工作壓力是自變項、離職意圖是依變項。主管支持改變的是「工作壓力→離職意圖」這條關係的強弱，屬於調節變項，回答的是「什麼條件下效果比較強或比較弱」。\",\"reviewHref\":\"/research-language#moderator\",\"difficulty\":2},{\"id\":\"L1-07\",\"layer\":1,\"topic\":\"中介 vs 調節\",\"type\":\"single\",\"stem\":\"如果你想知道 X 是「透過什麼中間過程」影響 Y，你要找的是哪一種變項？\",\"options\":[\"調節變項\",\"中介變項\",\"控制變項\",\"依變項\"],\"answer\":1,\"explanation\":\"「透過什麼中間過程」問的是機制與路徑，對應中介變項。如果問的是「什麼條件下效果比較強或比較弱」，那才是調節變項。\",\"reviewHref\":\"/research-language#mediator\",\"difficulty\":2},{\"id\":\"L1-08\",\"layer\":1,\"topic\":\"寫研究假設\",\"type\":\"single\",\"stem\":\"研究問題是「工作壓力是否會影響工作滿意度？」下列哪一個是合適的「方向性研究假設」？\",\"options\":[\"工作壓力應該跟工作滿意度有點關係吧\",\"工作壓力對工作滿意度具有負向影響\",\"工作壓力是一個很重要的變項\",\"等分析完再看要不要寫假設\"],\"answer\":1,\"explanation\":\"把研究問題改成「有方向的預期」就是假設。「工作壓力對工作滿意度具有負向影響」講明了方向、可被檢驗，符合方向性假設的寫法。\",\"reviewHref\":\"/research-variables#question-to-hypothesis\",\"difficulty\":2},{\"id\":\"L1-09\",\"layer\":1,\"topic\":\"研究假設的常見誤解\",\"type\":\"single\",\"stem\":\"關於研究假設，下列哪一個說法是「錯誤」的？\",\"options\":[\"假設應該來自理論或文獻\",\"假設要能被資料檢驗\",\"假設是等資料分析完之後才補寫的\",\"方向性假設會講清楚正向或負向\"],\"answer\":2,\"explanation\":\"假設不是分析完才補寫，也不是猜答案，應該事先根據文獻與研究架構提出。等看到結果才回頭寫「剛好符合」的假設，是常見但不正確的做法。\",\"reviewHref\":\"/research-language#hypothesis\",\"difficulty\":2},{\"id\":\"L1-10\",\"layer\":1,\"topic\":\"變項對應方法\",\"type\":\"scenario\",\"stem\":\"研究問題：「不同教學方法（分成三種）的學習成效是否有差異？」\\n下列哪一個組合最合理？\",\"options\":[\"依變項＝教學方法，用卡方檢定\",\"依變項＝學習成效，三組平均數比較常用 ANOVA\",\"依變項＝學習成效，用相關分析\",\"這個問題沒有依變項\"],\"answer\":1,\"explanation\":\"教學方法是自變項（分三組），學習成效是依變項（連續分數）。要比較三組以上的平均數，常用 ANOVA。這是把「變項型態」對應到「統計方法」的基本判斷。\",\"reviewHref\":\"/research-variables#variable-table\",\"difficulty\":2},{\"id\":\"L1-11\",\"layer\":1,\"topic\":\"變項對應方法\",\"type\":\"scenario\",\"stem\":\"研究問題：「是否使用 APP，與是否再購買，兩者有關聯嗎？」\\n兩個變項都是「是／否」的類別資料，最可能用哪個方法？\",\"options\":[\"相關分析\",\"t 檢定\",\"卡方檢定\",\"ANOVA\"],\"answer\":2,\"explanation\":\"兩個變項都是類別（是／否）時，檢查它們之間有沒有關聯，常用卡方檢定。相關與 t 檢定、ANOVA 通常需要連續變項，不適合這種兩個類別變項的情況。\",\"reviewHref\":\"/research-variables#variable-table\",\"difficulty\":2},{\"id\":\"L1-12\",\"layer\":1,\"topic\":\"找依變項\",\"type\":\"single\",\"stem\":\"「我最想解釋、比較或預測的那個結果」，指的是哪一種變項？\",\"options\":[\"自變項\",\"依變項\",\"控制變項\",\"中介變項\"],\"answer\":1,\"explanation\":\"問自己「我最想解釋、比較或預測的結果是什麼」，這個結果通常就是依變項。想找自變項則問「我懷疑哪個因素造成了差異」。\",\"reviewHref\":\"/research-variables#find-dependent\",\"difficulty\":1},{\"id\":\"L1-13\",\"layer\":1,\"topic\":\"控制變項\",\"type\":\"multi\",\"stem\":\"關於控制變項，下列哪些說法正確？（可複選）\",\"options\":[\"控制變項是可能干擾主要關係的其他因素\",\"納入控制變項是為了讓主要關係的判斷更可信\",\"控制變項放得越多一定越好\",\"控制變項就是研究的主角\"],\"answer\":[0,1],\"explanation\":\"控制變項是「除了主要原因外，也可能影響結果」的因素，納入是為了排除干擾。但它不是越多越好，也不是研究主角——主角是自變項與依變項。\",\"reviewHref\":\"/research-language#control-variable\",\"difficulty\":2},{\"id\":\"L1-14\",\"layer\":1,\"topic\":\"拆變項\",\"type\":\"scenario\",\"stem\":\"研究問題：「假評論接觸程度是否會影響消費者服務期待？」\\n哪一個是自變項？\",\"options\":[\"消費者服務期待\",\"假評論接觸程度\",\"品牌熟悉度\",\"過去消費經驗\"],\"answer\":1,\"explanation\":\"你懷疑「假評論接觸程度」會影響服務期待，所以它是自變項；消費者服務期待是想解釋的結果（依變項）；品牌熟悉度、過去消費經驗比較像控制變項。\",\"reviewHref\":\"/research-variables#full-examples\",\"difficulty\":1},{\"id\":\"L1-15\",\"layer\":1,\"topic\":\"研究問題的品質\",\"type\":\"single\",\"stem\":\"下列四個問題中，哪一個「還太籠統」，需要再縮小才能拿去分析？\",\"options\":[\"排隊時間是否會影響顧客滿意度？\",\"服務品質好不好？\",\"APP 易用性是否會影響再購意願？\",\"工作壓力是否會影響工作滿意度？\"],\"answer\":1,\"explanation\":\"「服務品質好不好？」沒有講清楚要比較什麼、用什麼變項衡量，太籠統。其他三個都點明了自變項與依變項，屬於可以直接分析的研究問題。\",\"reviewHref\":\"/research-variables#researchable-question\",\"difficulty\":1}]}}]]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"9:null\ne:[[\"$\",\"title\",\"0\",{\"children
