63,[\"/research_self_study/_next/static/chunks/015if3nq3p288.js\",\"/research_self_study/_next/static/chunks/14mrh2-p_w84d.js\",\"/research_self_study/_next/static/chunks/1ipf9t-bsy23i.js\",\"/research_self_study/_next/static/chunks/1g94rqa64b03x.js\"],\"QuizRunner\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"children\":[[\"$\",\"$L11\",null,{\"href\":\"/research-language\",\"className\":\"focus-ring mb-6 inline-flex items-center gap-2 rounded-md px-2 py-2 text-sm font-semibold text-brand-ink hover:bg-brand-tint/60\",\"children\":[[\"$\",\"svg\",null,{\"ref\":\"$undefined\",\"xmlns\":\"http://www.w3.org/2000/svg\",\"width\":24,\"height\":24,\"viewBox\":\"0 0 24 24\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"strokeWidth\":2,\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"className\":\"lucide lucide-arrow-left h-4 w-4\",\"aria-hidden\":\"true\",\"children\":[[\"$\",\"path\",\"1l729n\",{\"d\":\"m12 19-7-7 7-7\"}],[\"$\",\"path\",\"x3x0zl\",{\"d\":\"M19 12H5\"}],\"$undefined\"]}],\"回到\",\"研究語言入門\",\"內容\"]}],[\"$\",\"section\",null,{\"className\":\"mb-8 max-w-3xl\",\"children\":[[\"$\",\"div\",null,{\"className\":\"mb-3 flex flex-wrap items-center gap-3\",\"children\":[[\"$\",\"p\",null,{\"className\":\"eyebrow\",\"children\":\"Post-test\"}],[\"$\",\"span\",null,{\"className\":\"inline-flex items-center rounded-md px-2.5 py-1 text-xs font-medium ring-1 bg-brand-tint text-brand-ink ring-brand/25\",\"children\":\"第 0 層後測\"}]]}],[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold tracking-tight text-ink sm:text-4xl\",\"children\":\"研究語言入門・學習後測\"}],[\"$\",\"p\",null,{\"className\":\"mt-4 max-w-measure text-base leading-8 text-ink-soft sm:text-lg\",\"children\":\"測測看你是否分得清研究問題、變項、自變項、依變項與控制變項。\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-8 rounded-card rounded-tl-none border border-brand/25 bg-brand-tint/60 p-4 text-sm leading-7 text-ink-soft\",\"children\":[\"從題庫 \",15,\" 題中隨機抽出 \",10,\" 題，逐題作答、立即看解析。 答對 \",80,\"% 以上即為通過；沒過也沒關係，看完錯題解析再測一次，成績會記在你的裝置上。\"]}],[\"$\",\"$L12\",null,{\"meta\":{\"layer\":0,\"slug\":\"layer0\",\"levelLabel\":\"第 0 層\",\"title\":\"研究語言入門\",\"subtitle\":\"測測看你是否分得清研究問題、變項、自變項、依變項與控制變項。\",\"contentHref\":\"/research-language\",\"questions\":[{\"id\":\"L0-01\",\"layer\":0,\"topic\":\"研究問題\",\"type\":\"single\",\"stem\":\"下列哪一個比較適合當成一個「研究問題」？\",\"options\":[\"服務品質好不好？\",\"排隊時間是否會影響顧客滿意度？\",\"便利商店\",\"我覺得排隊好煩\"],\"answer\":1,\"explanation\":\"研究問題要能用資料回答，並清楚說出你想比較、了解或預測什麼。「服務品質好不好？」太籠統，還不能直接分析；「排隊時間是否會影響顧客滿意度？」講清楚了自變項與依變項，才適合研究。\",\"reviewHref\":\"/research-language#research-question\",\"difficulty\":1},{\"id\":\"L0-02\",\"layer\":0,\"topic\":\"變項\",\"type\":\"multi\",\"stem\":\"「變項」是會改變、可以觀察、可以記錄的東西。下列哪些可以當成變項？（可複選）\",\"options\":[\"顧客年齡\",\"滿意度分數（1 到 5）\",\"「便利商店」這個名詞本身\",\"排隊時間長短\"],\"answer\":[0,1,3],\"explanation\":\"不是所有名詞都是變項。年齡、滿意度分數、排隊時間都會變、能記錄、可分析，是變項；「便利商店」這個名詞本身沒有變化，不能直接拿來分析。\",\"reviewHref\":\"/research-language#variable\",\"difficulty\":1},{\"id\":\"L0-03\",\"layer\":0,\"topic\":\"自變項\",\"type\":\"scenario\",\"stem\":\"研究主題是「APP 易用性是否會影響消費者再購意願」。\\n在這個研究裡，哪一個是自變項（你懷疑會影響結果的原因）？\",\"options\":[\"APP 易用性\",\"再購意願\",\"品牌偏好\",\"顧客年齡\"],\"answer\":0,\"explanation\":\"自變項是你懷疑會影響結果的原因。這裡你懷疑「APP 易用性」會影響再購意願，所以 APP 易用性是自變項；再購意願是想解釋的結果（依變項），品牌偏好與年齡比較像控制變項。\",\"reviewHref\":\"/research-language#independent-variable\",\"difficulty\":1},{\"id\":\"L0-04\",\"layer\":0,\"topic\":\"依變項\",\"type\":\"scenario\",\"stem\":\"研究主題是「學習動機是否會影響學習成效」。\\n哪一個是依變項（你最想解釋或預測的結果）？\",\"options\":[\"學習動機\",\"學習成效\",\"年級\",\"上課時數\"],\"answer\":1,\"explanation\":\"依變項是研究中被解釋、比較或預測的結果。這裡最想知道的結果是「學習成效」，所以它是依變項。注意：依變項不是「比較重要」的變項，而是被影響的那一個。\",\"reviewHref\":\"/research-language#dependent-variable\",\"difficulty\":1},{\"id\":\"L0-05\",\"layer\":0,\"topic\":\"研究假設\",\"type\":\"single\",\"stem\":\"下列關於「研究假設」的敘述，哪一個正確？\",\"options\":[\"假設是等資料分析完之後才補寫的\",\"假設是依據理論或文獻事先提出、而且可以被資料檢驗的預期\",\"假設就是隨便猜一個答案\",\"假設寫得越模糊越安全\"],\"answer\":1,\"explanation\":\"研究假設應該來自文獻與研究架構，是事先提出、可被資料檢驗的預期關係，例如「排隊時間對顧客滿意度具有負向影響」。它不是分析完才補寫，也不是隨便猜。\",\"reviewHref\":\"/research-language#hypothesis\",\"difficulty\":2},{\"id\":\"L0-06\",\"layer\":0,\"topic\":\"控制變項\",\"type\":\"single\",\"stem\":\"研究「排隊時間是否影響顧客滿意度」時，把年齡、消費目的、尖峰時段一起納入「控制變項」，主要目的是什麼？\",\"options\":[\"讓模型看起來更複雜、更厲害\",\"避免這些因素干擾，導致誤判排隊時間與滿意度的關係\",\"因為控制變項放得越多一定越好\",\"用來取代自變項\"],\"answer\":1,\"explanation\":\"控制變項是那些也可能影響結果、但不是研究主角的因素，納入是為了排除干擾、讓主要關係更可信。但控制變項不是越多越好，亂放會讓模型難解釋，也可能吃掉樣本數。\",\"reviewHref\":\"/research-language#control-variable\",\"difficulty\":2},{\"id\":\"L0-07\",\"layer\":0,\"topic\":\"調節變項\",\"type\":\"scenario\",\"stem\":\"情境：研究者認為「主管支持會緩衝（降低）工作壓力對工作滿意度的負向影響」。\\n在這裡，「主管支持」扮演什麼角色？\",\"options\":[\"自變項\",\"中介變項\",\"調節變項\",\"依變項\"],\"answer\":2,\"explanation\":\"調節變項會改變 X 對 Y 影響的強弱或方向，回答的是「什麼條件下效果比較強或比較弱」。主管支持改變了「工作壓力→工作滿意度」這條關係的強度，所以是調節變項，不是中介。\",\"reviewHref\":\"/research-language#moderator\",\"difficulty\":2},{\"id\":\"L0-08\",\"layer\":0,\"topic\":\"中介變項\",\"type\":\"scenario\",\"stem\":\"情境：研究者認為「APP 易用性會先讓人覺得使用起來很滿意，進而提高再購意願」。\\n「使用滿意度」在這裡是什麼角色？\",\"options\":[\"控制變項\",\"中介變項\",\"調節變項\",\"自變項\"],\"answer\":1,\"explanation\":\"中介變項是用來解釋 X 為什麼會影響 Y 的中間機制。APP 易用性透過「使用滿意度」再影響再購意願，使用滿意度就是中間那一段路徑，屬於中介變項。\",\"reviewHref\":\"/research-language#mediator\",\"difficulty\":2},{\"id\":\"L0-09\",\"layer\":0,\"topic\":\"中介 vs 調節\",\"type\":\"single\",\"stem\":\"中介變項與調節變項最主要的差別是什麼？\",\"options\":[\"中介問「影響是透過什麼路徑發生」，調節問「什麼條件下效果會變強或變弱」\",\"兩者完全一樣，只是叫法不同\",\"中介一定比調節重要\",\"調節只是中介的另一個名字\"],\"answer\":0,\"explanation\":\"這是最容易混淆的地方：中介在回答「透過什麼機制／路徑」，調節在回答「在什麼條件下效果比較強或比較弱」。兩者問的問題不同，不能互換。\",\"reviewHref\":\"/research-language#moderator\",\"difficulty\":2},{\"id\":\"L0-10\",\"layer\":0,\"topic\":\"量尺與資料型態\",\"type\":\"single\",\"stem\":\"問卷把科系編碼成 1=資工、2=企管、3=外文。下列哪一個做法「不正確」？\",\"options\":[\"計算各科系的人數與百分比\",\"直接計算科系代碼的平均數，當作一個有意義的結果\",\"用科系把樣本分組來比較\",\"把科系當成類別（名目）變項處理\"],\"answer\":1,\"explanation\":\"科系代碼 1、2、3 只是類別標籤，數字大小沒有數量意義，不能拿去算平均。量尺決定資料能怎麼算：類別資料看次數與百分比，不能當成可平均的連續分數。\",\"reviewHref\":\"/research-language#measurement-scale\",\"difficulty\":2},{\"id\":\"L0-11\",\"layer\":0,\"topic\":\"量尺與資料型態\",\"type\":\"multi\",\"stem\":\"下列哪些屬於「類別（名目）資料」，不適合直接拿去算平均數？（可複選）\",\"options\":[\"性別\",\"科系\",\"是否使用 APP（是／否）\",\"排隊時間（分鐘）\"],\"answer\":[0,1,2],\"explanation\":\"性別、科系、是否使用 APP 都是類別資料，只能看次數與百分比，不能算平均。排隊時間是數值資料，可以算平均與標準差。\",\"reviewHref\":\"/research-language#measurement-scale\",\"difficulty\":2},{\"id\":\"L0-12\",\"layer\":0,\"topic\":\"樣本與母體\",\"type\":\"scenario\",\"stem\":\"情境：你想了解「全台灣大學生的線上學習滿意度」，但實際上只發問卷給某校 250 位學生填答。\\n這 250 位學生是什麼？\",\"options\":[\"母體\",\"樣本\",\"變項\",\"構面\"],\"answer\":1,\"explanation\":\"樣本是你實際收集到資料的那群人，也就是這 250 位；母體是你真正想了解的整個對象範圍（全台灣大學生）。你通常只能從樣本去推論母體。\",\"reviewHref\":\"/research-language#sample\",\"difficulty\":1},{\"id\":\"L0-13\",\"layer\":0,\"topic\":\"樣本與母體\",\"type\":\"single\",\"stem\":\"承上題，「全台灣大學生」在這個研究裡屬於什麼？\",\"options\":[\"樣本\",\"母體\",\"控制變項\",\"分析單位\"],\"answer\":1,\"explanation\":\"母體是你想推論的全部對象，這裡是全台灣大學生。不要把樣本（實際問到的 250 位）直接說成母體——樣本來源會決定你的結果能推論到誰。\",\"reviewHref\":\"/research-language#population\",\"difficulty\":2},{\"id\":\"L0-14\",\"layer\":0,\"topic\":\"構面與題項\",\"type\":\"single\",\"stem\":\"關於「構面」與「題項」，下列哪一個說法正確？\",\"options\":[\"一個題項就能完整代表一個構面\",\"構面是一組共同測量同一概念的題項，題項則是問卷裡的單一道題目\",\"構面就是問卷裡的某一題\",\"題項比構面更抽象\"],\"answer\":1,\"explanation\":\"構面是一個抽象概念下的一組題目（例如「服務品質」包含可靠性、反應速度、親切度）；題項是問卷裡的一句測量句子。不要用一題就代表複雜構面。\",\"reviewHref\":\"/research-language#construct\",\"difficulty\":2},{\"id\":\"L0-15\",\"layer\":0,\"topic\":\"操作型定義\",\"type\":\"single\",\"stem\":\"「學習滿意度」是一個抽象概念。下列哪一個做法才算幫它寫出「操作型定義」？\",\"options\":[\"說明學習滿意度是一個很重要的概念\",\"用一份五題的 Likert 量表，取平均分數來代表學習滿意度\",\"說學習滿意度就是學生感到滿意的程度\",\"大家都懂，不需要特別定義\"],\"answer\":1,\"explanation\":\"操作型定義是把抽象概念變成可觀察、可測量的方式。用五題 Likert 量表的平均分數來測量學習滿意度，才說清楚了「要怎麼把概念變成資料」；只寫概念定義卻沒說怎麼測量並不算。\",\"reviewHref\":\"/research-language#operational-definition\",\"difficulty\":2}]}}]]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"第 0 層後測：研究語言入門｜研究論文統計自學網站\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"研究語言入門的學習後測，15 題中隨機抽 10 題，逐題作答並立即回饋。\"}]]\n"])</script></body></html>
